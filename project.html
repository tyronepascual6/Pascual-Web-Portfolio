          "on-tertiary": "#ffffff", "surface-tint": "#5e5e5e", "surface-container-lowest": "#ffffff",

      }

<style>
  html, body { overflow-x: hidden; width: 100%; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .glass-surface {
    background: rgba(255, 255, 255, 0.4);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border: 1px solid rgba(255, 255, 255, 0.4);
  }
  .dark .glass-surface { background: rgba(20, 20, 20, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); }
  .mesh-gradient {
    background-color: #f8f9fa;
    background-image:
      radial-gradient(at 0% 0%, rgba(225, 224, 255, 0.5) 0px, transparent 50%),
      radial-gradient(at 100% 0%, rgba(217, 218, 219, 0.3) 0px, transparent 50%),
      radial-gradient(at 100% 100%, rgba(225, 224, 255, 0.4) 0px, transparent 50%),
      radial-gradient(at 0% 100%, rgba(243, 244, 245, 0.5) 0px, transparent 50%);
  }
  .dark .mesh-gradient {
    background-color: #0a0a0a;
    background-image:
      radial-gradient(at 0% 0%, rgba(70, 72, 212, 0.1) 0px, transparent 50%),
      radial-gradient(at 100% 0%, rgba(105, 0, 179, 0.05) 0px, transparent 50%),
      radial-gradient(at 100% 100%, rgba(70, 72, 212, 0.08) 0px, transparent 50%),
      radial-gradient(at 0% 100%, rgba(20, 20, 20, 0.1) 0px, transparent 50%);
  }
  .fade-in { animation: fadeIn 0.5s ease both; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  /* ── Mobile-specific tweaks ── */
  @media (max-width: 480px) {
    .glass-surface { backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); }
  }
</style>

<body class="bg-background dark:bg-[#0a0a0a] text-on-background dark:text-white font-body-md mesh-gradient selection:bg-secondary-fixed transition-colors duration-300 overflow-x-hidden">

<!-- Minimal Nav -->
<nav class="fixed top-3 sm:top-4 left-1/2 -translate-x-1/2 w-[94%] sm:w-[95%] max-w-[900px] rounded-full border border-white/40 dark:border-white/10 bg-white/60 dark:bg-black/40 backdrop-blur-[20px] shadow-[0px_20px_40px_rgba(0,0,0,0.05)] flex justify-between items-center px-4 sm:px-6 md:px-8 py-3 sm:py-4 z-50">
  <a href="index.html" class="flex items-center gap-2 font-headline-md text-base sm:text-headline-md tracking-tighter text-primary dark:text-white min-w-0">
    <span class="material-symbols-outlined flex-shrink-0" style="font-size:20px;">arrow_back</span>
    <span class="hidden sm:inline truncate">TYRONE PASCUAL</span>
  </a>
  <div class="flex items-center gap-2 sm:gap-sm flex-shrink-0">
    <button class="p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors flex items-center justify-center" id="theme-toggle" aria-label="Toggle theme">
      <span class="material-symbols-outlined text-primary dark:text-white" id="theme-toggle-icon" style="font-size:20px;">dark_mode</span>
    </button>
    <a href="index.html#projects" class="bg-primary dark:bg-white text-on-primary dark:text-black px-3 sm:px-5 py-2 rounded-full font-label-sm text-[10px] sm:text-label-sm transition-all duration-300 hover:opacity-80 whitespace-nowrap">All Projects</a>
  </div>
</nav>

<!-- Content is injected here by script -->
<main id="project-root" class="max-w-[900px] mx-auto px-4 sm:px-gutter pt-[100px] sm:pt-[120px] pb-lg sm:pb-xl min-h-screen">
  <!-- Loading state -->
  <div id="loading-state" class="text-center py-xl">
    <p class="font-body-md text-body-md text-on-surface-variant dark:text-gray-400">Loading project…</p>
  </div>
</main>

<!-- Footer -->
<footer class="w-full py-lg sm:py-xl border-t border-outline-variant/30 dark:border-white/5 bg-transparent">
  <div class="max-w-[900px] mx-auto px-4 sm:px-gutter flex flex-col md:flex-row justify-between items-center gap-sm sm:gap-md text-center md:text-left">
    <div class="font-headline-md text-lg sm:text-headline-md text-primary dark:text-white">TYRONE PASCUAL</div>
    <p class="font-label-sm text-label-sm text-on-surface-variant dark:text-gray-500">© 2026 Tyrone C. Pascual · BSIT Graduate, Universidad de Manila</p>
  </div>
</footer>

<script src="projects-data.js"></script>
<script>
  // ── Theme Toggle ──────────────────────────────────
  const themeToggle = document.getElementById('theme-toggle');
  const themeToggleIcon = document.getElementById('theme-toggle-icon');
  const html = document.documentElement;
  themeToggle.addEventListener('click', () => {
    html.classList.toggle('dark');
    const isDark = html.classList.contains('dark');
    themeToggleIcon.textContent = isDark ? 'light_mode' : 'dark_mode';
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
  });
  if (localStorage.getItem('theme') === 'dark') {
    html.classList.add('dark');
    themeToggleIcon.textContent = 'light_mode';
  }

  // ── Render Project ────────────────────────────────
  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function renderProject() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const root = document.getElementById('project-root');
    const project = id ? getProjectById(id) : null;

    if (!project) {
      root.innerHTML = `
        <div class="text-center py-lg sm:py-xl fade-in px-2">
          <span class="material-symbols-outlined text-secondary dark:text-secondary-fixed" style="font-size:56px;">search_off</span>
          <h1 class="font-headline-lg text-2xl sm:text-headline-lg mt-md dark:text-white">Project not found</h1>
          <p class="font-body-md text-sm sm:text-body-md text-on-surface-variant dark:text-gray-400 mt-sm mb-lg">The project you're looking for doesn't exist or may have moved.</p>
          <a href="index.html#projects" class="inline-flex px-lg sm:px-xl py-3 sm:py-4 bg-primary dark:bg-white text-on-primary dark:text-black rounded-full font-label-sm text-label-sm hover:opacity-80 transition-all">Back to Projects</a>
        </div>`;
      document.title = "Project Not Found | Tyrone C. Pascual";
      return;
    }

    document.title = project.title + " | Tyrone C. Pascual";

    const badgesHtml = project.badges.map(b =>
      `<span class="px-sm py-1 bg-secondary text-white rounded-full text-[9px] sm:text-[10px] font-bold uppercase tracking-wider">${escapeHtml(b)}</span>`
    ).join('');

    const techHtml = project.tech.map(t =>
      `<span class="px-sm py-1 glass-surface rounded-full text-[10px] sm:text-[11px] font-bold uppercase tracking-wider text-secondary dark:text-secondary-fixed">${escapeHtml(t)}</span>`
    ).join('');

    const featuresHtml = project.features.map(f => `
      <li class="flex items-start gap-sm">
        <span class="material-symbols-outlined text-secondary dark:text-secondary-fixed mt-1 flex-shrink-0" style="font-size:18px;">check_circle</span>
        <span class="font-body-md text-sm sm:text-body-md text-on-surface-variant dark:text-gray-300">${escapeHtml(f)}</span>
      </li>`
    ).join('');

    const linksHtml = `
      ${project.github ? `
        <a href="${escapeHtml(project.github)}" target="_blank" class="inline-flex items-center justify-center gap-2 px-md sm:px-lg py-2.5 sm:py-3 bg-primary dark:bg-white text-on-primary dark:text-black rounded-full font-label-sm text-[11px] sm:text-label-sm hover:opacity-85 transition-all w-full sm:w-auto">
          <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24" class="flex-shrink-0"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
          View Source
        </a>` : ''}
      ${project.liveDemo ? `
        <a href="${escapeHtml(project.liveDemo)}" target="_blank" class="inline-flex items-center justify-center gap-2 px-md sm:px-lg py-2.5 sm:py-3 glass-surface rounded-full font-label-sm text-[11px] sm:text-label-sm dark:text-white hover:bg-white/80 dark:hover:bg-white/10 transition-all w-full sm:w-auto">
          <span class="material-symbols-outlined" style="font-size:16px;">open_in_new</span> Live Demo
        </a>` : ''}
      ${project.publication ? `
        <a href="${escapeHtml(project.publication)}" target="_blank" class="inline-flex items-center justify-center gap-2 px-md sm:px-lg py-2.5 sm:py-3 glass-surface rounded-full font-label-sm text-[11px] sm:text-label-sm dark:text-white hover:bg-white/80 dark:hover:bg-white/10 transition-all w-full sm:w-auto">
          <span class="material-symbols-outlined" style="font-size:16px;">school</span> Publication
        </a>` : ''}
    `;

    root.innerHTML = `
      <div class="fade-in">

        <!-- Hero -->
        <div class="glass-surface rounded-2xl p-md sm:p-xl mb-md sm:mb-lg relative overflow-hidden">
          <div class="absolute -top-16 -right-16 w-56 h-56 bg-secondary-fixed/40 dark:bg-secondary-container/10 blur-[80px] rounded-full pointer-events-none"></div>
          <div class="relative z-10">
            <div class="flex items-center gap-2 sm:gap-sm mb-md flex-wrap">
              ${badgesHtml}
              <span class="px-sm py-1 glass-surface rounded-full text-[9px] sm:text-[10px] font-bold uppercase tracking-wider text-secondary dark:text-secondary-fixed">${escapeHtml(project.type)}</span>
            </div>
            <div class="flex flex-col sm:flex-row items-start sm:items-center gap-3 sm:gap-md mb-md">
              <div class="w-12 h-12 sm:w-16 sm:h-16 rounded-2xl glass-surface flex items-center justify-center flex-shrink-0">
                <span class="material-symbols-outlined text-secondary dark:text-secondary-fixed" style="font-size:28px;">${escapeHtml(project.icon)}</span>
              </div>
              <div class="min-w-0">
                <h1 class="font-display text-2xl sm:text-headline-lg md:text-display dark:text-white leading-tight break-words">${escapeHtml(project.title)}</h1>
                <p class="font-body-lg text-sm sm:text-body-lg text-on-surface-variant dark:text-gray-300">${escapeHtml(project.subtitle)}</p>
              </div>
            </div>
            <div class="flex flex-wrap gap-2 sm:gap-md font-label-sm text-[11px] sm:text-label-sm text-on-surface-variant dark:text-gray-400 uppercase mb-md sm:mb-lg">
              <span class="flex items-center gap-1"><span class="material-symbols-outlined" style="font-size:14px;">person</span>${escapeHtml(project.role)}</span>
              <span class="flex items-center gap-1"><span class="material-symbols-outlined" style="font-size:14px;">calendar_today</span>${escapeHtml(project.year)}</span>
            </div>
            <div class="flex flex-col sm:flex-row flex-wrap gap-3 sm:gap-md">${linksHtml}</div>
          </div>
        </div>

        <!-- Tech Stack -->
        <div class="mb-md sm:mb-lg">
          <h2 class="font-headline-md text-lg sm:text-headline-md mb-sm dark:text-white">Tech Stack</h2>
          <div class="flex flex-wrap gap-2 sm:gap-sm">${techHtml}</div>
        </div>

        <!-- Description -->
        <div class="mb-md sm:mb-lg">
          <h2 class="font-headline-md text-lg sm:text-headline-md mb-sm dark:text-white">Overview</h2>
          <p class="font-body-lg text-sm sm:text-body-lg text-on-surface-variant dark:text-gray-300 leading-relaxed">${escapeHtml(project.description)}</p>
        </div>

        <!-- Features -->
        <div class="glass-surface rounded-2xl p-md sm:p-lg mb-md sm:mb-lg">
          <h2 class="font-headline-md text-lg sm:text-headline-md mb-md dark:text-white">Key Features</h2>
          <ul class="space-y-sm">${featuresHtml}</ul>
        </div>

        <!-- Back -->
        <div class="text-center pt-md">
          <a href="index.html#projects" class="inline-flex items-center gap-2 font-label-sm text-sm sm:text-label-sm text-secondary dark:text-secondary-fixed hover:underline">
            <span class="material-symbols-outlined" style="font-size:16px;">arrow_back</span> Back to all projects
          </a>
        </div>

      </div>
    `;
  }

  renderProject();
</script>
</body>
</html>
